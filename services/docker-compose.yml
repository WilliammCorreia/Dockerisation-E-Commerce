services:
  auth-service:
    build:
      context: ./auth-service
      target: base
    ports:
      - "4012:${PORT:-3001}"
    depends_on:
      - mongodb-e-commerce
    networks:
      - e-commerce
  order-service:
    build:
      context: ./order-service
      target: base
    ports:
      - "4014:${PORT:-3002}"
    depends_on:
      - mongodb-e-commerce
    networks:
      - e-commerce
  mongodb-e-commerce:
    image: mongo:4.4.30-focal
    ports:
      - "4013:27017"
    networks:
      - e-commerce
  
networks:
  e-commerce:
    driver: bridge

secrets:
  jwt_secret:
    file: ./jwt_secret.txt