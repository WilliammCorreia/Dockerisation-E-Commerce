services:
  auth-service:
    build:
      context: ./auth-service
      target: dev
    volumes:
      - "/app/node_modules"
      - "./auth-service:/app"
    env_file: "auth-service/.env"
    secrets:
      - jwt_secret

  order-service:
    build:
      context: ./order-service
      target: dev
    volumes:
      - "/app/node_modules"
      - "./order-service:/app"
    env_file: "order-service/.env"
    secrets:
      - jwt_secret
  
  product-service:
    build:
      context: ./product-service
      target: dev
    volumes:
      - "/app/node_modules"
      - "./product-service:/app"
    env_file: "product-service/.env"
    secrets:
      - jwt_secret

secrets:
  jwt_secret:
    file: ./jwt_secret.dev.txt