services:
  reverse-proxy:
    build:
      context: ./reverse-proxy
      dockerfile: Dockerfile
    ports:
      - "80:4011"
    networks:
      - e-commerce-frontend
      - e-commerce-backend
    depends_on:
      - frontend
      - auth-service
      - order-service
      - product-service

  frontend:
    build:
      context: ./frontend
      target: base
    secrets:
      - jwt_secret
    networks:
      - e-commerce-frontend
    
  auth-service:
    build:
      context: ./services/auth-service
      target: base
    secrets:
      - jwt_secret
    depends_on:
      - mongodb-e-commerce
    networks:
      - e-commerce-backend
      - e-commerce-db

  order-service:
    build:
      context: ./services/order-service
      target: base
    secrets:
      - jwt_secret
    depends_on:
      - mongodb-e-commerce
    networks:
      - e-commerce-backend
      - e-commerce-db

  product-service:
    build:
      context: ./services/product-service
      target: base
    secrets:
      - jwt_secret
    depends_on:
      - mongodb-e-commerce
    networks:
      - e-commerce-backend
      - e-commerce-db

  mongodb-e-commerce:
    image: mongo:4.4.30-focal
    networks:
      - e-commerce-db

networks:
  e-commerce-frontend:
    driver: bridge
  e-commerce-backend:
    driver: bridge
  e-commerce-db:
    driver: bridge

secrets:
  jwt_secret:
    file: ./jwt_secret.txt